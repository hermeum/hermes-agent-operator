apiVersion: v1
kind: Secret
metadata:
  name: gh-agent-secrets
stringData:
  OLLAMA_API_KEY: ""
  GITHUB_TOKEN: ""
---
apiVersion: agents.hermeum.app/v1alpha1
kind: HermesAgent
metadata:
  name: gh-agent
spec:
  hermes:
    webhook:
      enabled: true
    config:
      raw:
        model:
          base_url: https://ollama.com/v1
          default: kimi-k2.6
          provider: ollama-cloud
        platforms:
          webhook:
            extra:
              routes:
                # NOTE: you have to configure the webhook in your GitHub repo to point to /webhook/github-pr for this to work
                github-pr:
                  events: ["pull_request"]
                  prompt: |
                    Review this pull request:
                    Repository: {repository.full_name}
                    PR #{number}: {pull_request.title}
                    Author: {pull_request.user.login}
                    URL: {pull_request.html_url}
                    Diff URL: {pull_request.diff_url}
                    Action: {action}
                  skills: ["github-code-review"]
                  deliver: "github_comment"
                  deliver_extra:
                    repo: "{repository.full_name}"
                    pr_number: "{number}"
    storage:
      persistence:
        enabled: true
        size: 1Gi
    envFrom:
      - secretRef:
          name: gh-agent-secrets
    initChownData: true
  networking:
    ingress:
      enabled: true
      className: nginx
      annotations:
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
      hosts:
        - host: gh-agent.example.com
          paths:
            - path: /
              pathType: Prefix
              port: 8642
      tls:
        - hosts:
            - gh-agent.example.com
          secretName: gh-agent-tls
  initContainers:
    - name: install-gh
      image: nousresearch/hermes-agent:latest
      command: ["/bin/sh", "-ec"]
      args:
        - |
          if command -v gh >/dev/null 2>&1; then
            echo "gh already installed, skipping"
            exit 0
          fi
          mkdir -p $HOME/bin
          GH_VERSION=2.94.0
          curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /tmp
          mv "/tmp/gh_${GH_VERSION}_linux_amd64/bin/gh" $HOME/bin/gh
          chmod +x $HOME/bin/gh
          echo "gh installed: $($HOME/bin/gh --version)"
      env:
        - name: HERMES_HOME
          value: /opt/data
        - name: HOME
          value: /opt/data/home
      volumeMounts:
        - name: hermes-data
          mountPath: /opt/data
